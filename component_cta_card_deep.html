<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>livelikejolam — cta_card (deep)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#F4EFE3;--deep:#2D2A22;--ink:#1A1A17;--warm-white:#E8DDC7;
  --muted:#7A7468;--muted-deep:#8A8474;
  --brass:#B8923B;--brass-bright:#C9A961;
  --line:#C8C0A8;--line-deep:#4A4538;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1080px;height:1350px;overflow:hidden;}
body{font-family:'Noto Serif TC',serif;font-feature-settings:"palt";-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;}

.slide{width:1080px;height:1350px;position:relative;overflow:hidden;}
.slide.ivory{background:var(--ivory);color:var(--ink);}
.slide.deep{background:var(--deep);color:var(--warm-white);}
.slide.photo{background:#000;color:#fff;}

.corner{position:absolute;width:72px;height:72px;z-index:4;pointer-events:none;}
.corner-tl{top:36px;left:36px;border-top:2px solid var(--brass);border-left:2px solid var(--brass);}
.corner-tr{top:36px;right:36px;border-top:2px solid var(--brass);border-right:2px solid var(--brass);}
.corner-bl{bottom:36px;left:36px;border-bottom:2px solid var(--brass);border-left:2px solid var(--brass);}
.corner-br{bottom:36px;right:36px;border-bottom:2px solid var(--brass);border-right:2px solid var(--brass);}
.deep .corner-tl,.photo .corner-tl{border-top-color:var(--brass-bright);border-left-color:var(--brass-bright);}
.deep .corner-tr,.photo .corner-tr{border-top-color:var(--brass-bright);border-right-color:var(--brass-bright);}
.deep .corner-bl,.photo .corner-bl{border-bottom-color:var(--brass-bright);border-left-color:var(--brass-bright);}
.deep .corner-br,.photo .corner-br{border-bottom-color:var(--brass-bright);border-right-color:var(--brass-bright);}

.banner{position:absolute;top:68px;left:90px;font-family:'Cormorant Garamond',serif;line-height:1.4;z-index:5;}
.banner-line1{font-size:22px;font-weight:600;letter-spacing:6px;text-transform:uppercase;}
.banner-line2{font-size:19px;font-weight:300;letter-spacing:3px;opacity:0.78;margin-top:4px;}
.ivory .banner{color:var(--ink);}
.deep .banner{color:var(--brass-bright);}
.deep .banner-line2{color:var(--warm-white);opacity:0.7;}
.photo .banner{color:#fff;}
.photo .banner-line2{color:rgba(255,255,255,0.8);}

.page-chip{position:absolute;top:76px;right:90px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;letter-spacing:6px;z-index:5;}
.ivory .page-chip{color:var(--muted);}
.deep .page-chip{color:var(--brass-bright);}
.photo .page-chip{color:rgba(255,255,255,0.85);}

.content{position:absolute;left:108px;right:108px;top:202px;bottom:198px;display:flex;flex-direction:column;justify-content:center;}

.eyebrow{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:8px;text-transform:uppercase;margin-bottom:36px;display:flex;align-items:center;gap:22px;}
.eyebrow::after{content:'';flex:1;height:1px;opacity:0.4;}
.ivory .eyebrow{color:var(--brass);}
.ivory .eyebrow::after{background:var(--brass);}
.deep .eyebrow{color:var(--brass-bright);}
.deep .eyebrow::after{background:var(--brass-bright);}
.photo .eyebrow{color:var(--brass-bright);}
.photo .eyebrow::after{background:var(--brass-bright);}

.footer-line{position:absolute;bottom:72px;left:108px;right:108px;padding-top:22px;display:flex;justify-content:space-between;align-items:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:4px;text-transform:uppercase;}
.ivory .footer-line{color:var(--muted);border-top:1px solid var(--line);}
.deep .footer-line{color:var(--muted-deep);border-top:1px solid var(--line-deep);}
.photo .footer-line{color:rgba(255,255,255,0.7);border-top:1px solid rgba(255,255,255,0.25);}

.h-xxl{font-weight:900;font-size:112px;line-height:1.10;letter-spacing:-2.2px;}
.h-xl{font-weight:900;font-size:104px;line-height:1.14;letter-spacing:-1.6px;}
.h-lg{font-weight:900;font-size:92px;line-height:1.20;letter-spacing:-1.2px;}
.h-md{font-weight:700;font-size:68px;line-height:1.28;letter-spacing:-0.6px;}
.h-sm{font-weight:700;font-size:56px;line-height:1.30;letter-spacing:-0.4px;}
.body-lg{font-size:38px;font-weight:500;line-height:1.55;}
.body{font-size:32px;font-weight:400;line-height:1.85;}
.body-sm{font-size:30px;font-weight:400;line-height:1.85;}

.underline{background-image:linear-gradient(transparent calc(100% - 12px),var(--brass) calc(100% - 12px),var(--brass) calc(100% - 6px),transparent calc(100% - 6px));background-repeat:no-repeat;padding:0 4px;}
.deep .underline,.photo .underline{background-image:linear-gradient(transparent calc(100% - 12px),var(--brass-bright) calc(100% - 12px),var(--brass-bright) calc(100% - 6px),transparent calc(100% - 6px));}

.cta-eyebrow{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:8px;text-transform:uppercase;margin-bottom:36px;}
.ivory .cta-eyebrow{color:var(--brass);}
.deep .cta-eyebrow{color:var(--brass-bright);}
.cta-mainline{font-size:48px;font-weight:700;line-height:1.45;letter-spacing:-0.4px;margin-bottom:48px;}
.cta-section-divider{width:110px;height:3px;margin:48px 0;}
.ivory .cta-section-divider{background:var(--brass);}
.deep .cta-section-divider{background:var(--brass-bright);}
.brand-mark{font-weight:900;font-size:72px;line-height:1.15;letter-spacing:-0.6px;margin-bottom:14px;}
.ivory .brand-mark{color:var(--brass);}
.deep .brand-mark{color:var(--brass-bright);}
.brand-tag{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:6px;text-transform:uppercase;margin-bottom:38px;}
.ivory .brand-tag{color:var(--muted);}
.deep .brand-tag{color:var(--muted-deep);}
.brand-detail{font-size:30px;font-weight:400;line-height:1.75;margin-bottom:44px;}
.cta-action{padding-top:28px;font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:5px;text-transform:uppercase;font-weight:500;}
.ivory .cta-action{border-top:1px solid var(--line);color:var(--ink);}
.deep .cta-action{border-top:1px solid var(--line-deep);color:var(--warm-white);}
.cta-action .accent{font-weight:600;letter-spacing:4px;}
.ivory .cta-action .accent{color:var(--brass);}
.deep .cta-action .accent{color:var(--brass-bright);}
</style>
</head>
<body>
<div class="slide deep">

  <span class="corner corner-tl"></span>
  <span class="corner corner-tr"></span>
  <span class="corner corner-bl"></span>
  <span class="corner corner-br"></span>
  <div class="banner">
    <div class="banner-line1">livelikejolam</div>
    <div class="banner-line2">by @jolamstoic</div>
  </div>
  <div class="page-chip">{{page_number}} / {{total_pages}}</div>
  <div class="footer-line">
    <span>livelikejolam.com</span>
    <span>{{page_number}} / {{total_pages}}</span>
  </div>

  <div class="content">
    <div class="cta-eyebrow">{{cta_eyebrow}}</div>
    <div class="cta-mainline">{{cta_mainline_html}}</div>
    <div class="cta-section-divider"></div>
    <div class="brand-mark">林作斯多葛</div>
    <div class="brand-tag">生活哲學 &middot; LIVELIKEJOLAM</div>
    <div class="brand-detail">三天課程<br>教你用理性 overcome 情緒<br>唔係教你冇情緒</div>
    <div class="cta-action">跟住 <span class="accent">{{cta_action_keyword}}</span> 落 livelikejolam.com</div>
  </div>
</div>
</body>
</html>
