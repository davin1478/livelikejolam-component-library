<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>headline_xl · deep</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --ivory: #F4EFE3;
    --deep: #2D2A22;
    --ink: #1A1A17;
    --warm-white: #E8DDC7;
    --brass: #B8923B;
    --brass-bright: #C9A961;
    --line: #C8C0A8;
    --line-deep: #4A4538;
    --muted: #7A7468;
    --muted-deep: #8A8474;
  }


  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; }
  body {
    font-family: 'Noto Serif TC', serif;
    overflow: hidden;
  }
  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }
  .slide.ivory { background: var(--ivory); color: var(--ink); }
  .slide.deep { background: var(--deep); color: var(--warm-white); }
  .slide.photo { background: #000; }

  /* Corners */
  .corner { position: absolute; width: 64px; height: 64px; z-index: 4; }
  .corner-tl { top: 36px; left: 36px; border-top: 2px solid var(--brass); border-left: 2px solid var(--brass); }
  .corner-tr { top: 36px; right: 36px; border-top: 2px solid var(--brass); border-right: 2px solid var(--brass); }
  .corner-bl { bottom: 36px; left: 36px; border-bottom: 2px solid var(--brass); border-left: 2px solid var(--brass); }
  .corner-br { bottom: 36px; right: 36px; border-bottom: 2px solid var(--brass); border-right: 2px solid var(--brass); }

  /* Banner */
  .banner {
    position: absolute; top: 60px; left: 80px;
    font-family: 'Cormorant Garamond', serif; line-height: 1.5; z-index: 5;
  }
  .banner-line1 { font-weight: 600; letter-spacing: 5px; text-transform: uppercase; font-size: 18px; }
  .banner-line2 { font-size: 14px; opacity: 0.75; font-weight: 300; margin-top: 4px; letter-spacing: 2.5px; }
  .ivory .banner { color: var(--ink); }
  .deep .banner { color: var(--brass-bright); }
  .deep .banner-line2 { color: var(--warm-white); }
  .photo .banner { color: #fff; }

  /* Page chip */
  .page-chip {
    position: absolute; top: 60px; right: 80px;
    font-family: 'Cormorant Garamond', serif; font-size: 20px;
    letter-spacing: 4px; z-index: 5; font-weight: 500;
  }
  .ivory .page-chip { color: var(--muted); }
  .deep .page-chip { color: var(--brass-bright); }
  .photo .page-chip { color: rgba(255,255,255,0.85); }

  /* Content area */
  .content {
    position: absolute; left: 100px; right: 100px;
    top: 200px; bottom: 200px;
    display: flex; flex-direction: column; justify-content: center;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; letter-spacing: 6px; text-transform: uppercase;
    margin-bottom: 32px; font-weight: 500;
    display: flex; align-items: center; gap: 20px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; opacity: 0.4; }
  .ivory .eyebrow { color: var(--brass); }
  .ivory .eyebrow::after { background: var(--brass); }
  .deep .eyebrow { color: var(--brass-bright); }
  .deep .eyebrow::after { background: var(--brass-bright); }

  /* Footer */
  .footer-line {
    position: absolute; bottom: 70px; left: 100px; right: 100px;
    padding-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Cormorant Garamond', serif; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .ivory .footer-line { color: var(--muted); border-top: 1px solid var(--line); }
  .deep .footer-line { color: var(--muted-deep); border-top: 1px solid var(--line-deep); }
  .photo .footer-line { color: rgba(255,255,255,0.7); border-top: 1px solid rgba(255,255,255,0.25); }

  /* Typography */
  .h-xl { font-weight: 900; font-size: 96px; line-height: 1.18; letter-spacing: -1px; }
  .h-lg { font-weight: 900; font-size: 80px; line-height: 1.22; letter-spacing: -0.5px; }
  .h-md { font-weight: 700; font-size: 62px; line-height: 1.3; }
  .body { font-size: 32px; line-height: 1.85; }
  .body-md { font-size: 34px; line-height: 1.85; }

  /* Underline accent */
  .underline {
    background-image: linear-gradient(transparent calc(100% - 10px), var(--brass) calc(100% - 10px), var(--brass) calc(100% - 4px), transparent calc(100% - 4px));
    background-size: 100% 100%; background-repeat: no-repeat;
    padding: 0 4px;
  }
  .deep .underline {
    background-image: linear-gradient(transparent calc(100% - 10px), var(--brass-bright) calc(100% - 10px), var(--brass-bright) calc(100% - 4px), transparent calc(100% - 4px));
  }


</style>
</head>
<body>

<div class="slide deep">

  <span class="corner corner-tl"></span><span class="corner corner-tr"></span>
  <span class="corner corner-bl"></span><span class="corner corner-br"></span>
  <div class="banner">
    <div class="banner-line1">livelikejolam</div>
    <div class="banner-line2">by @jolamstoic</div>
  </div>
  <div class="page-chip">{{page_number}} / {{total_pages}}</div>
  <div class="content">
    <div class="eyebrow">{{eyebrow}}</div>
    <div class="h-xl">{{headline_html}}</div>
    <div class="body" style="margin-top: 44px;">{{body_text_html}}</div>
  </div>
  <div class="footer-line"><span>livelikejolam.com</span><span>{{page_number}} / {{total_pages}}</span></div>

</div>

</body>
</html>
